# ==========================================================================
#  cuda_params.conf - SeisSol build parameters for install_seissol.sh
#  Reference: https://packages.spack.io/package.html?name=seissol
#             https://seissol.readthedocs.io/en/latest/build-parameters.html
#
#  Usage:  ./install_seissol.sh --params-file seissol_params.conf
#
#  Format:  param_name = value
#           Lines starting with # and blank lines are ignored.
#           Inline comments are also stripped (everything after the first #).
#
#  Special key:
#    version           -> seissol@<version>  (default: master)
# =========================================================================

# --- SeisSol package version ----------------------------------
# A branch name, tag, or commit.
# 'master' tracks the latest development head.
version                = 1.3.1

# --- Parameters ----------------------------------------------
# Polynomial convergence order
convergence_order      = 4

# Equation set to compile for
equations              = elastic

# Floating-point precision
precision              = double

# List for CPU GEMM generators
gemm_tools_list        = LIBXSMM

# Enable or disable ASAGI as input for fault and material information
asagi                  = true

# GPU CUDA
#
# TIP: for CUDA builds, run the installer with:
#         ./install_seissol.sh --params-file conf_examples/cuda_params.conf --spec-extra "^cuda@12"
#      CUDA 13 removed APIs that SeisSol's backend still uses (AdaptiveCpp/hipSYCL 24.10),
#      so a CUDA 13 build fails to compile. Pinning "^cuda@12" keeps the
#      toolchain on the 12.x series.
cuda                   = true
cuda_arch              = 89     # <- architecture, see https://seissol.readthedocs.io/en/latest/build-archs.html
